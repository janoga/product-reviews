name: product-reviews

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-product_reviews}
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '${MINIO_HOST_PORT:-9000}:9000' # API
      - '${MINIO_CONSOLE_PORT:-9001}:9001' # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-product-images}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 \${MINIO_ACCESS_KEY} \${MINIO_SECRET_KEY};
      mc mb myminio/\${MINIO_BUCKET} --ignore-existing;
      mc anonymous set download myminio/\${MINIO_BUCKET};
      echo 'Bucket \${MINIO_BUCKET} created and set to public-read.';
      "

volumes:
  postgres_data:
  minio_data:
